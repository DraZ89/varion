    <style>/* ============================================
   EDGE — Sports Betting Analytics
   Aesthetic: Data Terminal / Trading Desk
   Dark, dense, surgical. No fluff.
   ============================================ */

:root {
  --bg-deep: #0a0a0b;
  --bg-base: #0f0f11;
  --bg-elev: #16161a;
  --bg-card: #1a1a1f;
  --bg-hover: #22222a;

  --border: #2a2a32;
  --border-strong: #3a3a45;

  --text-primary: #f5f5f7;
  --text-secondary: #a8a8b3;
  --text-muted: #6b6b78;
  --text-dim: #4a4a56;

  --accent: #d4ff3f;        /* lime électrique - signature */
  --accent-dim: #8aa830;
  --accent-glow: rgba(212, 255, 63, 0.15);

  --green: #22c55e;
  --green-bg: rgba(34, 197, 94, 0.12);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.12);
  --amber: #f59e0b;
  --amber-bg: rgba(245, 158, 11, 0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59, 130, 246, 0.12);
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.5;
  letter-spacing: -0.01em;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body {
  /* Subtle grid texture */
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ====== TYPOGRAPHY ====== */
.font-display {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.04em;
}
.font-mono {
  font-family: 'JetBrains Mono', monospace;
}

/* ====== SCROLLBAR ====== */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 0;
}
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ====== UTILITIES ====== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  position: relative;
}

.card-hover {
  transition: all 0.15s ease;
}
.card-hover:hover {
  border-color: var(--border-strong);
  background: var(--bg-hover);
  transform: translateY(-1px);
}

.divider {
  height: 1px;
  background: var(--border);
  width: 100%;
}

.divider-v {
  width: 1px;
  background: var(--border);
  height: 100%;
}

/* ====== BADGE / TAGS ====== */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text-secondary);
}

.tag-accent {
  background: var(--accent-glow);
  border-color: var(--accent-dim);
  color: var(--accent);
}
.tag-green { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.tag-red { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.tag-amber { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
.tag-blue { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }

/* ====== BUTTON ====== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
  background: var(--accent-glow);
}
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg-base);
}
.btn-primary:hover {
  background: var(--accent-dim);
  border-color: var(--accent-dim);
  color: var(--bg-base);
}

/* ====== STAT DISPLAY ====== */
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.02em;
  font-weight: normal;
  line-height: 1;
}

.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* ====== PROGRESS BAR ====== */
.progress {
  width: 100%;
  height: 4px;
  background: var(--bg-deep);
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.progress-fill.green { background: var(--green); }
.progress-fill.red { background: var(--red); }
.progress-fill.amber { background: var(--amber); }
.progress-fill.blue { background: var(--blue); }

/* ====== LIVE DOT ====== */
.live-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ====== ANIMATIONS ====== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in {
  animation: fadeIn 0.4s ease-out backwards;
}

/* ====== HEADER ====== */
.header {
  background: var(--bg-deep);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(8px);
}

/* ====== LOGO ====== */
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.12em;
  position: relative;
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
}
.logo::after {
  content: "";
  width: 8px;
  height: 8px;
  background: var(--accent);
  display: inline-block;
}

/* ====== NAV ====== */
.nav-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 6px 10px;
  color: var(--text-secondary);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s ease;
}
.nav-link:hover {
  color: var(--text-primary);
}
.nav-link.active {
  color: var(--accent);
  border-color: var(--border);
}

/* ====== SECTION HEADER ====== */
.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.05em;
  margin: 0;
}
.section-header .section-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
}

/* ====== MATCH CARD HOVER ====== */
.match-card {
  position: relative;
  cursor: pointer;
}
.match-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: var(--accent);
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.2s ease;
}
.match-card:hover::before {
  transform: scaleY(1);
}

/* ====== CONFIDENCE METER ====== */
.confidence-bar {
  position: relative;
  height: 24px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  overflow: hidden;
}
.confidence-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red) 0%, var(--amber) 50%, var(--green) 100%);
  transition: width 0.6s ease;
}
.confidence-marker {
  position: absolute;
  top: -2px;
  width: 2px;
  height: 28px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}

/* ====== TABLE ====== */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.data-table th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 10px;
}
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
}
.data-table tr:hover td {
  background: var(--bg-hover);
}

/* ====== PROBABILITY GAUGE ====== */
.proba-gauge {
  display: flex;
  height: 28px;
  border: 1px solid var(--border);
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
}
.proba-segment {
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  transition: all 0.3s ease;
}
.proba-segment.home { background: #2563eb; }
.proba-segment.draw { background: #525252; }
.proba-segment.away { background: #dc2626; }

/* ====== VALUE BET CARD ====== */
.value-bet {
  position: relative;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
}
.value-bet.strong {
  border-left: 3px solid var(--accent);
  background: linear-gradient(90deg, var(--accent-glow) 0%, var(--bg-card) 50%);
}
.value-bet.high {
  border-left: 3px solid var(--green);
}
.value-bet.moderate {
  border-left: 3px solid var(--amber);
}

/* ====== PLAYER CARD ====== */
.player-row {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s ease;
}
.player-row:hover {
  background: var(--bg-hover);
}
.player-row.key {
  background: linear-gradient(90deg, var(--accent-glow) 0%, transparent 100%);
}

.pos-badge {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  border: 1px solid var(--border);
}
.pos-GK { color: #f59e0b; border-color: #f59e0b; }
.pos-DEF { color: #3b82f6; border-color: #3b82f6; }
.pos-MID { color: #22c55e; border-color: #22c55e; }
.pos-FWD { color: #ef4444; border-color: #ef4444; }

/* ====== TICKER ====== */
.ticker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ticker-sep {
  color: var(--text-dim);
}

/* ====== RESPONSIVE ====== */
@media (max-width: 768px) {
  .desktop-only { display: none; }
}
@media (min-width: 769px) {
  .mobile-only { display: none; }
}

/* ====== SPINNER ====== */
.spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ====== FORM INDICATOR (W/D/L) ====== */
.form-pill {
  width: 16px;
  height: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  margin-right: 2px;
}
.form-W { background: var(--green); color: white; }
.form-D { background: var(--text-muted); color: white; }
.form-L { background: var(--red); color: white; }
</style>

<script type="text/babel" data-presets="react">
// API client - Sports Betting Analytics
// Mode hybride : essaie d'abord l'API live, fallback sur data.json statique
const API_BASE = window.API_BASE || "http://localhost:8000";

let _staticData = null;
async function loadStatic() {
  if (_staticData) return _staticData;
  _staticData = window.__INLINE_DATA__;
    return _staticData;
}

async function tryApi(path) {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 1500);
    const res = await fetch(`${API_BASE}${path}`, { signal: ctrl.signal });
    clearTimeout(t);
    if (!res.ok) throw new Error("API error");
    return res.json();
  } catch (e) {
    return null;
  }
}

window.api = {
  async matches() {
    const live = await tryApi("/api/matches");
    if (live) return live;
    const data = await loadStatic();
    return data ? data.matches_summary : [];
  },
  async match(id) {
    const live = await tryApi(`/api/matches/${id}`);
    if (live) return live;
    const data = await loadStatic();
    return data ? data.matches_full[id] : null;
  },
  async teams() {
    const live = await tryApi("/api/teams");
    if (live) return live;
    const data = await loadStatic();
    return data ? data.teams : [];
  },
  async valueBets(minEdge = 5) {
    const live = await tryApi(`/api/value-bets?min_edge=${minEdge}`);
    if (live) return live;
    const data = await loadStatic();
    if (!data) return [];
    return data.value_bets.filter(b => b.edge_pct >= minEdge);
  },
};

// Composants communs
const { useState, useEffect } = React;

// ========== HELPERS ==========
window.helpers = {
  formToLetters(form10) {
    return form10.map(r => r === 1 ? "W" : r === 0 ? "D" : "L");
  },
  pct(v) { return `${v.toFixed(1)}%`; },
  num(v, d = 2) { return v.toFixed(d); },
  formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short" });
  },
  confidenceLabel(score) {
    if (score >= 70) return { label: "ÉLEVÉE", color: "var(--green)" };
    if (score >= 45) return { label: "MOYENNE", color: "var(--amber)" };
    return { label: "FAIBLE", color: "var(--red)" };
  },
};

// ========== HEADER ==========
window.Header = function Header({ active, onNav }) {
  return (
    <header className="header">
      <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div className="flex items-center gap-8">
          <div className="logo">VARION</div>
          <div className="ticker desktop-only">
            <span className="live-dot"></span>
            <span>MODÈLE ACTIF</span>
            <span className="ticker-sep">/</span>
            <span>POISSON × FORME × xG</span>
            <span className="ticker-sep">/</span>
            <span>PREMIER LEAGUE</span>
          </div>
        </div>
        <nav className="flex items-center gap-2">
          {[
            { id: "dashboard", label: "Matchs" },
            { id: "value", label: "Value Bets" },
            { id: "teams", label: "Équipes" },
          ].map(item => (
            <div
              key={item.id}
              className={`nav-link ${active === item.id ? "active" : ""}`}
              onClick={() => onNav(item.id)}
            >
              {item.label}
            </div>
          ))}
        </nav>
      </div>
    </header>
  );
};

// ========== SPINNER ==========
window.Loading = function Loading({ label = "Calcul en cours" }) {
  return (
    <div className="flex flex-col items-center justify-center py-20 gap-4">
      <div className="spinner"></div>
      <div className="font-mono text-xs uppercase tracking-widest text-[var(--text-muted)]">
        {label}
      </div>
    </div>
  );
};

// ========== STAT BLOCK ==========
window.StatBlock = function StatBlock({ label, value, suffix = "", trend = null, big = false }) {
  return (
    <div>
      <div className="stat-label">{label}</div>
      <div className="flex items-baseline gap-1 mt-1">
        <span className={`stat-num ${big ? "text-4xl" : "text-2xl"}`}>{value}</span>
        {suffix && <span className="text-xs text-[var(--text-muted)] font-mono">{suffix}</span>}
        {trend !== null && (
          <span className={`text-xs font-mono ml-1 ${trend > 0 ? "text-[var(--green)]" : trend < 0 ? "text-[var(--red)]" : "text-[var(--text-muted)]"}`}>
            {trend > 0 ? "▲" : trend < 0 ? "▼" : "—"}
          </span>
        )}
      </div>
    </div>
  );
};

// ========== PROBA GAUGE 1X2 ==========
window.ProbaGauge = function ProbaGauge({ home, draw, away, homeLabel, awayLabel }) {
  return (
    <div>
      <div className="flex justify-between text-[10px] font-mono uppercase tracking-wider text-[var(--text-muted)] mb-1">
        <span>{homeLabel}</span>
        <span>NUL</span>
        <span>{awayLabel}</span>
      </div>
      <div className="proba-gauge">
        <div className="proba-segment home" style={{ width: `${home}%` }}>
          {home > 12 && `${home.toFixed(0)}%`}
        </div>
        <div className="proba-segment draw" style={{ width: `${draw}%` }}>
          {draw > 12 && `${draw.toFixed(0)}%`}
        </div>
        <div className="proba-segment away" style={{ width: `${away}%` }}>
          {away > 12 && `${away.toFixed(0)}%`}
        </div>
      </div>
    </div>
  );
};

// ========== FORM PILLS ==========
window.FormPills = function FormPills({ form }) {
  const letters = window.helpers.formToLetters(form);
  return (
    <div className="flex">
      {letters.map((l, i) => (
        <div key={i} className={`form-pill form-${l}`} title={`Match ${i + 1}: ${l}`}>{l}</div>
      ))}
    </div>
  );
};

// ========== SCORE METER (0-100) ==========
window.ScoreMeter = function ScoreMeter({ value, label, color = "var(--accent)" }) {
  return (
    <div>
      <div className="flex justify-between items-baseline mb-1">
        <span className="stat-label">{label}</span>
        <span className="font-mono text-sm font-semibold">{value.toFixed(0)}</span>
      </div>
      <div className="progress">
        <div className="progress-fill" style={{ width: `${value}%`, background: color }}></div>
      </div>
    </div>
  );
};

// Cache des SVG charges
window.__LOGO_CACHE = {};
window.__LOGO_FAILED = {};

// ========== TEAM LOGO BLOCK ==========
window.TeamLogo = function TeamLogo({ team, size = 40 }) {
  const [svgContent, setSvgContent] = useState(window.__LOGO_CACHE[team?.id] || null);
  const [failed, setFailed] = useState(window.__LOGO_FAILED[team?.id] || false);

  useEffect(() => {
    if (!team || svgContent || failed) return;
    if (window.__LOGO_CACHE[team.id]) {
      setSvgContent(window.__LOGO_CACHE[team.id]);
      return;
    }
    // Charger le SVG local : ./logos/{TEAM_ID}.svg
    const inline = window.__INLINE_LOGOS && window.__INLINE_LOGOS[team.id];
    if (inline) {
      const clean = inline.replace(/<script[\s\S]*?<\/script>/gi, "");
      window.__LOGO_CACHE[team.id] = clean;
      setSvgContent(clean);
    } else {
      window.__LOGO_FAILED[team.id] = true;
      setFailed(true);
    }
  }, [team?.id]);

  if (!team) return null;

  // SVG officiel chargé : on l'affiche directement
  if (svgContent) {
    return (
      <div
        style={{
          width: size,
          height: size,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          flexShrink: 0,
        }}
      >
        <div
          style={{ width: "100%", height: "100%" }}
          dangerouslySetInnerHTML={{ __html: svgContent }}
        />
      </div>
    );
  }

  // En cours de chargement : skeleton discret
  if (!failed) {
    return (
      <div
        style={{
          width: size,
          height: size,
          background: "var(--bg-elev)",
          border: "1px solid var(--border)",
          flexShrink: 0,
        }}
      />
    );
  }

  // Echec du chargement : carre couleur + abréviation (fallback final)
  return (
    <div
      style={{
        width: size,
        height: size,
        background: team.logo_color || "#444",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        fontFamily: "Bebas Neue",
        fontSize: size * 0.45,
        color: "white",
        letterSpacing: "0.05em",
        border: "1px solid var(--border)",
        flexShrink: 0,
      }}
    >
      {team.short ? team.short.substring(0, 3).toUpperCase() : team.id}
    </div>
  );
};

// ========== CONFIDENCE BAR ==========
window.ConfidenceBar = function ConfidenceBar({ score }) {
  const conf = window.helpers.confidenceLabel(score);
  return (
    <div>
      <div className="flex justify-between mb-2">
        <span className="stat-label">Score de confiance</span>
        <span className="font-mono text-sm font-semibold" style={{ color: conf.color }}>
          {score}/100 — {conf.label}
        </span>
      </div>
      <div className="confidence-bar">
        <div className="confidence-fill" style={{ width: "100%" }}></div>
        <div className="confidence-marker" style={{ left: `${score}%` }}></div>
      </div>
    </div>
  );
};

// Match Card - utilisé dans le dashboard

window.MatchCard = function MatchCard({ match, onClick }) {
  const { home, away, predictions_summary: pred, top_value_bet, confidence_score, value_bets_count } = match;
  const conf = window.helpers.confidenceLabel(confidence_score);

  return (
    <div className="card card-hover match-card p-5 fade-in" onClick={onClick}>
      {/* Top row : meta */}
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-2">
          <span className="font-mono text-[10px] uppercase tracking-widest text-[var(--text-muted)]">
            {match.competition}
          </span>
          {match.is_derby && <span className="tag tag-amber">DERBY</span>}

  return (
    <div className="card p-6">
      <div className="flex items-center gap-3 mb-4">
        <window.TeamLogo team={team.info} size={32} />

      />

      <window.MarketCard

window.H2HTable = function H2HTable({ h2h, home, away }) {

// Value Bets Page - aggregation across all matches

const { useState: useStateVB, useEffect: useEffectVB } = React;

window.ValueBetsPage = function ValueBetsPage({ onMatchClick }) {
  const [bets, setBets] = useStateVB([]);
  const [minEdge, setMinEdge] = useStateVB(5);
  const [loading, setLoading] = useStateVB(true);

  useEffectVB(() => {
    setLoading(true);
    window.api.valueBets(minEdge)
      .then(d => { setBets(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, [minEdge]);

  if (loading) return <window.Loading label="Détection des value bets" />;

  return (
    <div className="max-w-7xl mx-auto px-6 py-8 fade-in">
      <div className="flex items-end justify-between mb-8">
        <div>
          <div className="font-mono text-[10px] text-[var(--accent)] uppercase tracking-widest">
            VALUE BET ENGINE
          </div>
          <h1 className="font-display text-5xl mt-1">OPPORTUNITÉS</h1>
          <div className="font-mono text-xs text-[var(--text-muted)] uppercase tracking-widest mt-2">
            COTES BOOKMAKER VS PROBABILITÉS MODÈLE · {bets.length} OPPORTUNITÉS DÉTECTÉES
          </div>
        </div>
        <div className="flex items-center gap-3">
          <span className="font-mono text-[10px] uppercase tracking-widest text-[var(--text-muted)]">
            EDGE MIN.
          </span>
          {[3, 5, 8, 12].map(v => (
            <button
              key={v}
              className={`btn ${minEdge === v ? "btn-primary" : ""}`}
              onClick={() => setMinEdge(v)}
            >
              ≥ {v}%
            </button>
          ))}
        </div>
      </div>

      {bets.length === 0 ? (
        <div className="card p-12 text-center">
          <div className="font-display text-3xl text-[var(--text-muted)] mb-2">PAS DE VALUE</div>
          <div className="font-mono text-sm text-[var(--text-muted)]">
            Aucun pari ne dépasse le seuil d'edge configuré.
          </div>
        </div>
      ) : (
        <div className="space-y-3">
          {bets.map((bet, i) => (
            <div
              key={i}
              className="card card-hover p-5 cursor-pointer"
              onClick={() => onMatchClick(bet.match_id)}
            >
              <div className="grid grid-cols-12 gap-4 items-center">
                <div className="col-span-3">
                  <div className="font-mono text-[10px] text-[var(--text-muted)] uppercase tracking-widest">
                    {bet.match_date} · {bet.match_kickoff}
                  </div>
                  <div className="font-display text-xl mt-1">{bet.match_label}</div>
                </div>

                <div className="col-span-4">
                  <div className="stat-label">MARCHÉ</div>
                  <div className="font-medium mt-1">{bet.market}</div>
                  <div className="font-mono text-xs text-[var(--text-muted)] mt-1">
                    Sélection : <span className="text-[var(--text-primary)]">{bet.selection}</span>
                  </div>
                </div>

                <div className="col-span-2 text-center">
                  <div className="stat-label">COTE</div>
                  <div className="font-display text-2xl mt-1">{bet.odds.toFixed(2)}</div>
                </div>

                <div className="col-span-2 text-center">
                  <div className="stat-label">PROBAS</div>
                  <div className="font-mono text-sm mt-1">
                    <span className="text-[var(--green)] font-semibold">{bet.model_prob.toFixed(0)}%</span>
                    <span className="text-[var(--text-muted)] mx-1">vs</span>
                    <span className="text-[var(--text-muted)]">{bet.implied_prob.toFixed(0)}%</span>
                  </div>
                </div>

                <div className="col-span-1 text-right">
                  <div className="stat-label">EDGE</div>
                  <div className="font-display text-2xl mt-1 text-[var(--accent)]">
                    +{bet.edge_pct.toFixed(0)}%
                  </div>
                </div>
              </div>

              <div className="mt-3 pt-3 border-t border-[var(--border)] flex items-center gap-3">
                <span className={`tag ${
                  bet.confidence === "strong" ? "tag-accent" :
                  bet.confidence === "high" ? "tag-green" : "tag-amber"
                }`}>
                  {bet.confidence === "strong" ? "🔥 STRONG" :
                   bet.confidence === "high" ? "✅ HIGH" : "💡 MODERATE"}
                </span>
                <span className="text-xs text-[var(--text-secondary)]">{bet.explanation}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

window.TeamsPage = function TeamsPage({ onTeamClick }) {
  const [teams, setTeams] = useStateVB([]);
  const [loading, setLoading] = useStateVB(true);

  useEffectVB(() => {
    window.api.teams()
      .then(d => { setTeams(d); setLoading(false); })
      .catch(() => setLoading(false));

  if (loading) return <window.Loading />;

  const sorted = [...teams].sort((a, b) => a.rank - b.rank);

  return (
    <div className="max-w-7xl mx-auto px-6 py-8 fade-in">

                <td className="font-mono">{t.rank}</td>
                <td>

                    <window.TeamLogo team={t} size={28} />
                    <span className="font-medium">{t.name}</span>
                  </div>

// EDGE - App principal

const { useState: useStateApp, useEffect: useEffectApp } = React;

function Dashboard({ onMatchClick }) {
  const [matches, setMatches] = useStateApp([]);
  const [loading, setLoading] = useStateApp(true);
  const [error, setError] = useStateApp(null);

  useEffectApp(() => {
    window.api.matches()
      .then(d => { setMatches(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  if (loading) return <window.Loading label="Chargement des matchs" />;
  if (error) return (
    <div className="max-w-3xl mx-auto px-6 py-20 text-center">
      <div className="font-display text-3xl text-[var(--red)] mb-3">CONNEXION IMPOSSIBLE</div>
      <div className="font-mono text-sm text-[var(--text-muted)]">{error}</div>
      <div className="mt-6 font-mono text-xs text-[var(--text-muted)]">
        Assurez-vous que le backend tourne sur http://localhost:8000
      </div>
    </div>
  );

  // Stats agrégées
  const totalValue = matches.reduce((s, m) => s + m.value_bets_count, 0);
  const avgGoals = matches.reduce((s, m) => s + m.predictions_summary.expected_goals, 0) / Math.max(1, matches.length);

  return (
    <div className="max-w-7xl mx-auto px-6 py-8 fade-in">
      {/* HERO */}
      <div className="mb-10">
        <div className="font-mono text-[10px] text-[var(--accent)] uppercase tracking-widest">
          DASHBOARD · MATCHS À VENIR
        </div>
        <h1 className="font-display text-6xl mt-1 leading-none">
          {matches.length} MATCHS<span className="text-[var(--accent)]">.</span>
        </h1>
        <div className="mt-4 grid grid-cols-4 gap-6 max-w-3xl">
          <div>
            <div className="stat-label">VALUE BETS DÉTECTÉS</div>
            <div className="font-display text-3xl mt-1 text-[var(--accent)]">{totalValue}</div>
          </div>
          <div>
            <div className="stat-label">BUTS MOYENS PRÉVUS</div>
            <div className="font-display text-3xl mt-1">{avgGoals.toFixed(2)}</div>
          </div>
          <div>
            <div className="stat-label">MOTEUR</div>
            <div className="font-mono text-sm mt-1 text-[var(--text-secondary)]">POISSON × xG</div>
          </div>
          <div>
            <div className="stat-label">DERNIÈRE MAJ</div>
            <div className="font-mono text-sm mt-1 text-[var(--text-secondary)]">À L'INSTANT</div>
          </div>
        </div>
      </div>

      {/* MATCHES LIST */}
      <div className="space-y-4">
        {matches.map((m, i) => (
          <div key={m.id} style={{ animationDelay: `${i * 60}ms` }} className="fade-in">
            <window.MatchCard match={m} onClick={() => onMatchClick(m.id)} />
          </div>
        ))}
      </div>
    </div>
  );
}


function App() {
  const [view, setView] = useStateApp("dashboard");
  const [selectedMatch, setSelectedMatch] = useStateApp(null);

  const handleMatchClick = (id) => {
    setSelectedMatch(id);
    setView("match");
  };

  const handleBack = () => {
    setSelectedMatch(null);
    setView("dashboard");
  };

  const handleNav = (id) => {
    setSelectedMatch(null);
    setView(id);
  };

  let content;
  if (view === "match" && selectedMatch) {
    content = <window.MatchDetail matchId={selectedMatch} onBack={handleBack} />;
  } else if (view === "value") {
    content = <window.ValueBetsPage onMatchClick={handleMatchClick} />;
  } else if (view === "teams") {
    content = <window.TeamsPage />;
  } else {
    content = <Dashboard onMatchClick={handleMatchClick} />;
  }

  return (
    <div>
      <window.Header active={view === "match" ? "dashboard" : view} onNav={handleNav} />
      {content}
      <footer className="border-t border-[var(--border)] py-8 mt-12">
        <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
          <div className="font-mono text-[10px] text-[var(--text-muted)] uppercase tracking-widest">
            VARION · SPORTS BETTING ANALYTICS · MVP v1.0
          </div>
          <div className="font-mono text-[10px] text-[var(--text-muted)] uppercase tracking-widest">
            POISSON BIVARIÉ × DIXON-COLES × xG/xA × FORME PONDÉRÉE
          </div>
        </div>
      </footer>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
